<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIP Quote Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body {
  height: 100%;
}

body {
  min-height: 100vh;
  background: linear-gradient(180deg, #0f172a, #020617);
  background-attachment: fixed;
  color: #e5e7eb;
  font-family: Inter, sans-serif;
}

body::before {
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle at 20% 20%, rgba(59,130,246,0.15), transparent 40%);
  pointer-events:none;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
}

.input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color:white;
}

.input:focus {
  border-color:#3b82f6;
  box-shadow:0 0 10px rgba(59,130,246,0.5);
  outline:none;
}

.tab-active {
  background: rgba(59,130,246,0.2);
  border:1px solid rgba(59,130,246,0.4);
}

.step { display:none; }
.step.active { display:block; }

.progress-bar {
  height:8px;
  background:#1e293b;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:#3b82f6;
  width:20%;
  transition:0.3s;
}

/* INTRO */

#introScreen {
  transition: opacity 0.6s ease, visibility 0.6s;
}

.intro-logo {
  transform: scale(0.7);
  opacity: 0;
  animation: logoIn 1.5s ease forwards;
}

.intro-text {
  transform: translateY(20px);
  animation: textIn 1s ease forwards;
  animation-delay: 0.8s;
}

@keyframes logoIn {
  0% { opacity:0; transform:scale(0.7);}
  60% { opacity:1; transform:scale(1.8);}
  100% { transform:scale(1);}
}

@keyframes textIn {
  to { opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="p-6">

<!-- INTRO -->
<div id="introScreen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black">

<img 
src="https://raw.githubusercontent.com/N10ai/mip-tools/main/Untitled%20design%20-%201.png"
class="w-24 h-24 mb-6 intro-logo object-contain"
/>

<div class="text-lg tracking-wide text-white opacity-0 intro-text">
Smart Logistics. Faster Decisions.
</div>

</div>

<form id="quoteForm">

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">

<div class="flex items-center gap-3">
<img src="https://raw.githubusercontent.com/N10ai/mip-tools/main/Untitled%20design%20-%201.png"
class="h-14 object-contain">

<div>
<div class="text-sm font-semibold">MIP Cargo Express</div>
<div class="text-xs text-gray-400">Instant Quote Portal</div>
</div>
</div>

<button type="button" id="aiFill"
class="px-5 py-2.5 rounded-lg text-sm font-semibold
bg-gradient-to-r from-blue-500 to-indigo-500
text-white shadow-lg">
⚡ Autofill with AI
</button>

</div>

<!-- HERO -->
<div class="mb-6">
<h2 class="text-2xl font-semibold mb-2">
Get your freight quote in seconds
</h2>
<p class="text-sm text-gray-400">
Enter shipment details or use AI Autofill.
</p>
</div>

<!-- TABS -->
<div class="flex gap-3 mb-4">
<button class="tab tab-active px-4 py-2 rounded-full" data-step="0">Contact</button>
<button class="tab px-4 py-2 rounded-full" data-step="1">Shipment</button>
<button class="tab px-4 py-2 rounded-full" data-step="2">Cargo</button>
<button class="tab px-4 py-2 rounded-full" data-step="3">Pickup</button>
<button class="tab px-4 py-2 rounded-full" data-step="4">Review</button>
</div>

<div class="progress-bar mb-6">
<div id="progress" class="progress-fill"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

<!-- LEFT -->
<div class="lg:col-span-2 glass p-6 rounded-2xl">

<!-- STEP 0 -->
<div class="step active">
<input name="referenceNumber" class="input p-3 rounded mb-3" placeholder="Reference Number (optional)">
<input name="email" required class="input p-3 rounded" placeholder="Email">
<button type="button" class="next mt-4 bg-blue-600 px-4 py-2 rounded">Continue</button>
</div>

<!-- STEP 1 -->
<div class="step">

<select id="mode" name="mode" class="input p-3 rounded-lg w-full mb-4">
<option value="">Transport Mode</option>
<option value="air">Air</option>
<option value="ocean">Ocean</option>
<option value="ground">Ground</option>
</select>

<input id="originSearch" class="input p-3 rounded mb-3" placeholder="Origin">
<input id="destinationSearch" class="input p-3 rounded" placeholder="Destination">

<input type="hidden" id="originCode">
<input type="hidden" id="originName">
<input type="hidden" id="originCountry">

<input type="hidden" id="destinationCode">
<input type="hidden" id="destinationName">
<input type="hidden" id="destinationCountry">

<div id="serviceWrap" class="mt-4 hidden">
<select id="serviceType" class="input p-3 rounded w-full"></select>
</div>

<div id="containerWrap" class="mt-3 hidden">
<select class="input p-3 rounded w-full">
<option>20GP</option><option>40HQ</option>
</select>
</div>

<button type="button" class="next mt-4 bg-blue-600 px-4 py-2 rounded">Next</button>

</div>

<!-- STEP 2 -->
<div class="step">
<button type="button" class="prev">Back</button>
<button type="button" class="next">Next</button>
</div>

<!-- STEP 3 -->
<div class="step">
<button type="button" class="prev">Back</button>
<button type="button" class="next">Next</button>
</div>

<!-- STEP 4 -->
<div class="step">
<button type="submit" class="bg-blue-600 w-full py-3 rounded">Submit</button>
</div>

</div>

<!-- RIGHT -->
<div class="glass p-6 rounded-2xl">
<div id="summary"></div>
</div>

</div>
</form>

<script>

// LOAD JSON
let logisticsLocations = [];
fetch("logistics-locations.json")
.then(r=>r.json())
.then(d=>logisticsLocations=d);

// STEP SYSTEM
let step=0;
const steps=document.querySelectorAll(".step");

function showStep(i){
step=i;
steps.forEach((s,idx)=>s.classList.toggle("active", idx===i));
document.querySelectorAll(".tab").forEach((t,idx)=>t.classList.toggle("tab-active", idx===i));
document.getElementById("progress").style.width=((i+1)/5*100)+"%";
}

document.querySelectorAll(".next").forEach(b=>b.onclick=()=>showStep(step+1));
document.querySelectorAll(".prev").forEach(b=>b.onclick=()=>showStep(step-1));
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>showStep(Number(t.dataset.step)));

// AUTOCOMPLETE
function attachSearch(id,type){
const input=document.getElementById(id);

input.addEventListener("input",()=>{
const q=input.value.toLowerCase();

const res=logisticsLocations.filter(l=>
l.city.toLowerCase().includes(q) ||
l.code.toLowerCase().includes(q)
).slice(0,5);

console.log(res);
});
}

attachSearch("originSearch","origin");
attachSearch("destinationSearch","destination");

// INTRO
window.onload=()=>{
setTimeout(()=>{
const i=document.getElementById("introScreen");
i.style.opacity="0";
setTimeout(()=>i.style.display="none",600);
},2000);
};

</script>

</body>
</html>
