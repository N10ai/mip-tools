<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIP Quote Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    color: #e5e7eb;
    font-family: Inter, sans-serif;
  }

  .glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .glow {
    box-shadow: 0 0 25px rgba(59,130,246,0.25);
  }

  .input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.2s;
  }

  .input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
    outline: none;
  }

  .tab-active {
    background: rgba(59,130,246,0.2);
    border: 1px solid rgba(59,130,246,0.4);
  }

</style>
</head>

<body class="p-6">

<form id="quoteForm">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">

  <div class="flex items-center gap-3">
    <img src="https://via.placeholder.com/40" class="h-8">
    <h1 class="text-lg font-semibold">MIP Quote Portal</h1>
  </div>

  <!-- AI BUTTON -->
  <button type="button" id="aiFill"
    class="glass px-4 py-2 rounded-lg hover:bg-white/10 transition">
    AI Autofill
  </button>

</div>

<!-- TABS -->
<div class="flex gap-3 mb-6">
  <button type="button" class="tab tab-active px-4 py-2 rounded-full">Shipment</button>
  <button type="button" class="tab px-4 py-2 rounded-full">Cargo</button>
  <button type="button" class="tab px-4 py-2 rounded-full">Pickup</button>
  <button type="button" class="tab px-4 py-2 rounded-full">Review</button>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- MAIN FORM -->
  <div class="lg:col-span-2 glass p-6 rounded-2xl glow">

    <!-- SHIPMENT -->
    <h2 class="text-lg mb-4">Shipment Details</h2>

    <div class="grid grid-cols-2 gap-4">

      <input class="input p-3 rounded-lg"
        name="origin" placeholder="Origin (City / Airport)">

      <input class="input p-3 rounded-lg"
        name="destination" placeholder="Destination">

      <select class="input p-3 rounded-lg" name="mode">
        <option value="">Mode</option>
        <option>Air</option>
        <option>Ocean</option>
        <option>Ground</option>
      </select>

      <select class="input p-3 rounded-lg" name="direction">
        <option value="">Direction</option>
        <option>Import</option>
        <option>Export</option>
      </select>

    </div>

    <!-- SERVICES -->
    <div class="mt-6">
      <h3 class="mb-3">Services</h3>

      <div class="flex gap-3 flex-wrap">

        <label class="glass px-4 py-2 rounded-full cursor-pointer">
          <input type="checkbox" name="bonded" class="mr-2">
          Bonded
        </label>

        <label class="glass px-4 py-2 rounded-full cursor-pointer">
          <input type="checkbox" name="ftz" class="mr-2">
          FTZ
        </label>

      </div>
    </div>

    <!-- CARGO -->
    <div class="mt-8">
      <h2 class="text-lg mb-4">Cargo Details</h2>

      <div class="grid grid-cols-2 gap-4">

        <input class="input p-3 rounded-lg"
          name="qty" placeholder="Qty">

        <input class="input p-3 rounded-lg"
          name="weight" placeholder="Weight">

        <input class="input p-3 rounded-lg"
          name="length" placeholder="Length">

        <input class="input p-3 rounded-lg"
          name="width" placeholder="Width">

        <input class="input p-3 rounded-lg"
          name="height" placeholder="Height">

        <input class="input p-3 rounded-lg"
          name="commodity" placeholder="Commodity">

      </div>
    </div>

  </div>

  <!-- SUMMARY -->
  <div class="glass p-6 rounded-2xl sticky top-6 h-fit">

    <h2 class="text-lg mb-4">Live Summary</h2>

    <div class="text-sm space-y-2" id="summary">
      <p>Origin: —</p>
      <p>Destination: —</p>
      <p>Mode: —</p>
    </div>

    <button type="submit"
      class="w-full mt-6 py-3 rounded-lg bg-blue-600 hover:bg-blue-500 transition glow">
      Generate Quote
    </button>

  </div>

</div>

</form>

<script>

//////////////////////////////////////////////////
// LIVE SUMMARY
//////////////////////////////////////////////////

const form = document.getElementById('quoteForm');

form.addEventListener('input', () => {
  const data = new FormData(form);

  document.getElementById('summary').innerHTML = `
    <p>Origin: ${data.get('origin') || '—'}</p>
    <p>Destination: ${data.get('destination') || '—'}</p>
    <p>Mode: ${data.get('mode') || '—'}</p>
  `;
});

//////////////////////////////////////////////////
// AI AUTOFILL
//////////////////////////////////////////////////

document.getElementById('aiFill').onclick = () => {

  const aiData = {
    origin: "Miami, FL",
    destination: "New York, NY",
    mode: "Air",
    direction: "Export",
    qty: "2",
    weight: "120",
    length: "48",
    width: "40",
    height: "45",
    commodity: "Electronics"
  };

  for (let key in aiData) {
    const field = document.querySelector(`[name="${key}"]`);
    if (field) field.value = aiData[key];
  }

  form.dispatchEvent(new Event('input'));
};

//////////////////////////////////////////////////
// FORM SUBMIT (KEEP YOUR EXISTING LOGIC HERE)
//////////////////////////////////////////////////

form.addEventListener('submit', function(e) {
  e.preventDefault();

  const data = new FormData(form);

  // 👉 KEEP YOUR EXISTING WEBHOOK / PDF FUNCTION HERE
  console.log(Object.fromEntries(data));

  alert("Ready to connect with your webhook/PDF logic");
});

</script>

</body>
</html>
