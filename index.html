<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIP Quote Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
  color: #e5e7eb;
  font-family: Inter, sans-serif;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
}

.input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color:white;
}

.input:focus {
  border-color:#3b82f6;
  box-shadow:0 0 10px rgba(59,130,246,0.5);
  outline:none;
}

.tab-active {
  background: rgba(59,130,246,0.2);
  border:1px solid rgba(59,130,246,0.4);
}

.step { display:none; }
.step.active { display:block; }

.progress-bar {
  height:8px;
  background:#1e293b;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:#3b82f6;
  width:25%;
  transition:0.3s;
}

</style>
</head>

<body class="p-6">

<form id="quoteForm">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-lg font-semibold">MIP Quote Portal</h1>

  <button type="button" id="aiFill"
    class="glass px-4 py-2 rounded-lg hover:bg-white/10">
    AI Autofill
  </button>
</div>

<!-- TABS -->
<div class="flex gap-3 mb-4">
  <button type="button" class="tab tab-active px-4 py-2 rounded-full" data-step="0">Shipment</button>
  <button type="button" class="tab px-4 py-2 rounded-full" data-step="1">Cargo</button>
  <button type="button" class="tab px-4 py-2 rounded-full" data-step="2">Pickup</button>
  <button type="button" class="tab px-4 py-2 rounded-full" data-step="3">Review</button>
</div>

<div class="progress-bar mb-6">
  <div id="progress" class="progress-fill"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

<!-- LEFT -->
<div class="lg:col-span-2 glass p-6 rounded-2xl">

<!-- STEP 1 -->
<div class="step active">

<div class="grid grid-cols-2 gap-4">

<input name="origin" class="input p-3 rounded-lg" placeholder="Origin">
<input name="destination" class="input p-3 rounded-lg" placeholder="Destination">

<select name="mode" class="input p-3 rounded-lg">
<option value="">Mode</option>
<option value="air">Air</option>
<option value="ocean">Ocean</option>
<option value="ground">Ground</option>
</select>

<select name="direction" class="input p-3 rounded-lg">
<option value="">Direction</option>
<option value="import">Import</option>
<option value="export">Export</option>
</select>

</div>

<div class="mt-4 flex gap-4">
<label><input type="checkbox" id="isBonded"> Bonded</label>
<label><input type="checkbox" id="isFTZ"> FTZ</label>
</div>

<button type="button" class="next mt-6 bg-blue-600 px-4 py-2 rounded">Next</button>

</div>

<!-- STEP 2 -->
<div class="step">

<div id="cargoItems"></div>

<button type="button" id="addCargo" class="mt-4 bg-blue-600 px-4 py-2 rounded">
+ Add Cargo
</button>

<div id="totals" class="mt-4 text-sm"></div>

<div class="flex justify-between mt-6">
<button type="button" class="prev">Back</button>
<button type="button" class="next bg-blue-600 px-4 py-2 rounded">Next</button>
</div>

</div>

<!-- STEP 3 -->
<div class="step">

<label><input type="checkbox" id="includeInland"> Include Inland</label>

<div id="inlandFields" class="hidden mt-4">

<input id="pickupCompany" class="input p-3 rounded mb-2" placeholder="Pickup Company">
<input id="deliveryCompany" class="input p-3 rounded" placeholder="Delivery Company">

</div>

<div class="flex justify-between mt-6">
<button type="button" class="prev">Back</button>
<button type="button" class="next bg-blue-600 px-4 py-2 rounded">Next</button>
</div>

</div>

<!-- STEP 4 -->
<div class="step">

<div id="review"></div>

<button type="submit" class="mt-6 w-full bg-blue-600 py-3 rounded">
Submit Quote
</button>

</div>

</div>

<!-- RIGHT SUMMARY -->
<div class="glass p-6 rounded-2xl">

<h2 class="mb-4">Live Summary</h2>
<div id="summary" class="text-sm space-y-2"></div>

</div>

</div>

</form>

<script>

//////////////////////////////////////////////////
// STEP SYSTEM
//////////////////////////////////////////////////

let step = 0;
const steps = document.querySelectorAll(".step");

function showStep(i){
  step = i;

  steps.forEach((s,idx)=>s.classList.toggle("active", idx===i));

  document.querySelectorAll(".tab").forEach((t,idx)=>{
    t.classList.toggle("tab-active", idx===i);
  });

  document.getElementById("progress").style.width = ((i+1)/4*100)+"%";
}

document.querySelectorAll(".next").forEach(btn=>{
  btn.onclick = ()=>showStep(step+1);
});

document.querySelectorAll(".prev").forEach(btn=>{
  btn.onclick = ()=>showStep(step-1);
});

document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick = ()=>showStep(Number(tab.dataset.step));
});

//////////////////////////////////////////////////
// CARGO SYSTEM
//////////////////////////////////////////////////

let cargoIndex = 0;
const cargoEl = document.getElementById("cargoItems");

function addCargo(){
  const div = document.createElement("div");
  div.className="mb-4";

  div.innerHTML = `
  <input class="input p-2 mb-1 qty" placeholder="Qty">
  <input class="input p-2 mb-1 weight" placeholder="Weight">
  <input class="input p-2 mb-1 length" placeholder="Length">
  <input class="input p-2 mb-1 width" placeholder="Width">
  <input class="input p-2 mb-1 height" placeholder="Height">
  `;

  cargoEl.appendChild(div);
}

document.getElementById("addCargo").onclick = addCargo;

//////////////////////////////////////////////////
// SUMMARY
//////////////////////////////////////////////////

const form = document.getElementById("quoteForm");

form.addEventListener("input", ()=>{
  const data = new FormData(form);

  document.getElementById("summary").innerHTML = `
  <p>Origin: ${data.get("origin")||"-"}</p>
  <p>Destination: ${data.get("destination")||"-"}</p>
  <p>Mode: ${data.get("mode")||"-"}</p>
  `;
});

//////////////////////////////////////////////////
// AI
//////////////////////////////////////////////////

document.getElementById("aiFill").onclick = ()=>{
  document.querySelector('[name="origin"]').value="Miami";
  document.querySelector('[name="destination"]').value="NYC";
  form.dispatchEvent(new Event("input"));
};

//////////////////////////////////////////////////
// INLAND TOGGLE
//////////////////////////////////////////////////

document.getElementById("includeInland").onchange = e=>{
  document.getElementById("inlandFields").classList.toggle("hidden", !e.target.checked);
};

//////////////////////////////////////////////////
// SUBMIT
//////////////////////////////////////////////////

form.onsubmit = async (e)=>{
  e.preventDefault();

  const payload = Object.fromEntries(new FormData(form));

  payload.isBonded = document.getElementById("isBonded").checked;
  payload.isFTZ = document.getElementById("isFTZ").checked;

  console.log(payload);

  alert("Ready to connect webhook");
};

</script>

</body>
</html>
