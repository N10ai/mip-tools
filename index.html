<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIP Quote Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body {
  min-height: 100%;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,0.14), transparent 28%),
    linear-gradient(180deg, #0f172a 0%, #020617 100%);
  background-attachment: fixed;
  color: #e5e7eb;
  font-family: Inter, sans-serif;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
}

.input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color:white;
}

.input::placeholder {
  color: rgba(255,255,255,0.5);
}

.input:focus {
  border-color:#3b82f6;
  box-shadow:0 0 10px rgba(59,130,246,0.5);
  outline:none;
}

.tab-active {
  background: rgba(59,130,246,0.2);
  border:1px solid rgba(59,130,246,0.4);
}

.step { display:none; }
.step.active { display:block; }

.progress-bar {
  height:8px;
  background:#1e293b;
  border-radius:999px;
}

.progress-fill {
  height:100%;
  background:#3b82f6;
  width:20%;
  transition:0.3s;
}

/* INTRO */

#introScreen {
  transition: opacity 0.6s ease;
}
</style>
</head>

<body class="p-6">

<!-- INTRO -->
<div id="introScreen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black">

<img 
src="https://raw.githubusercontent.com/N10ai/mip-tools/main/Untitled%20design%20-%201.png"
class="w-24 h-24 mb-6 object-contain"
/>

<div class="text-lg text-white">
Smart Logistics. Faster Decisions.
</div>

</div>

<form id="quoteForm">

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">

<div class="flex items-center gap-3">
<img src="https://raw.githubusercontent.com/N10ai/mip-tools/main/Untitled%20design%20-%201.png"
class="h-14 object-contain">

<div>
<div class="text-sm font-semibold">MIP Cargo Express</div>
<div class="text-xs text-gray-400">Instant Quote Portal</div>
</div>
</div>

<button type="button" id="aiFill"
class="px-5 py-2.5 rounded-lg text-sm font-semibold
bg-gradient-to-r from-blue-500 to-indigo-500 text-white">
⚡ Autofill
</button>

</div>

<!-- TABS -->
<div class="flex gap-3 mb-4 flex-wrap">
<button type="button" class="tab tab-active px-4 py-2 rounded-full" data-step="0">Contact</button>
<button type="button" class="tab px-4 py-2 rounded-full" data-step="1">Shipment</button>
<button type="button" class="tab px-4 py-2 rounded-full" data-step="2">Cargo</button>
<button type="button" class="tab px-4 py-2 rounded-full" data-step="3">Pickup</button>
<button type="button" class="tab px-4 py-2 rounded-full" data-step="4">Review</button>
</div>

<div class="progress-bar mb-6">
<div id="progress" class="progress-fill"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

<!-- LEFT -->
<div class="lg:col-span-2 glass p-6 rounded-2xl">

<!-- STEP 0 -->
<div class="step active">
<input name="referenceNumber" class="input p-3 rounded-lg mb-4" placeholder="Reference">
<input name="email" type="email" required class="input p-3 rounded-lg" placeholder="Email">
<button type="button" class="next mt-6 bg-blue-600 px-4 py-2 rounded">Continue</button>
</div>

<!-- STEP 1 -->
<div class="step">

<select id="mode" name="mode" class="input p-3 rounded-lg w-full mb-4">
<option value="">Mode</option>
<option value="air">Air</option>
<option value="ocean">Ocean</option>
<option value="ground">Ground</option>
</select>

<div id="airOceanFields">
<input id="originSearch" class="input p-3 rounded-lg mb-3" placeholder="Origin">
<input id="destinationSearch" class="input p-3 rounded-lg" placeholder="Destination">

<input type="hidden" id="originCode">
<input type="hidden" id="destinationCode">
</div>

<div id="serviceWrap" class="hidden mt-4">
<select id="serviceType" class="input p-3 rounded-lg w-full"></select>
</div>

<button type="button" class="next mt-6 bg-blue-600 px-4 py-2 rounded">Next</button>

</div>

<!-- STEP 2 -->
<div class="step">
<div id="cargoItems"></div>
<button id="addCargo" type="button" class="bg-blue-600 px-4 py-2 mt-4 rounded">+ Cargo</button>
</div>

</div>

<!-- RIGHT -->
<div class="glass p-6 rounded-2xl">
<div id="summary"></div>
</div>

</div>
</form>

<script>

// INTRO FIX
document.addEventListener("DOMContentLoaded",()=>{
  setTimeout(()=>{
    document.getElementById("introScreen").style.display="none";
  },1500);
});

// STEP
let step=0;
const steps=document.querySelectorAll(".step");

function showStep(i){
  step=i;
  steps.forEach((s,idx)=>s.classList.toggle("active",idx===i));
  document.getElementById("progress").style.width=((i+1)/5*100)+"%";
}

document.querySelectorAll(".next").forEach(b=>b.onclick=()=>showStep(step+1));
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>showStep(+t.dataset.step));

// CARGO
document.getElementById("addCargo").onclick=()=>{
  const d=document.createElement("div");
  d.innerHTML=`<input class="input p-2 mb-2" placeholder="Qty">`;
  cargoItems.appendChild(d);
};

// SERVICE
mode.onchange=()=>{
  serviceWrap.classList.add("hidden");
  serviceType.innerHTML="";

  if(mode.value==="ocean"){
    serviceWrap.classList.remove("hidden");
    serviceType.innerHTML=`<option>LCL</option><option>FCL</option>`;
  }
};

// AUTOCOMPLETE
let locations=[];

fetch("https://raw.githubusercontent.com/N10ai/mip-tools/main/logistics-locations.json")
.then(r=>r.json())
.then(d=>{
  locations=d;
  attach("originSearch","origin");
  attach("destinationSearch","destination");
});

function attach(id,type){
  const input=document.getElementById(id);
  const box=document.createElement("div");
  box.className="absolute bg-black text-white w-full mt-1 hidden z-50";
  input.parentElement.appendChild(box);

  input.oninput=()=>{
    const q=input.value.toLowerCase();
    if(q.length<2)return box.classList.add("hidden");

    const res=locations.filter(l=>(l.search||"").toLowerCase().includes(q)).slice(0,5);

    box.innerHTML="";
    res.forEach(l=>{
      const o=document.createElement("div");
      o.className="p-2 hover:bg-white/10 cursor-pointer";
      o.innerText=`${l.code} - ${l.city}`;
      o.onclick=()=>{
        input.value=`${l.code} - ${l.city}`;
        box.classList.add("hidden");
      };
      box.appendChild(o);
    });

    box.classList.remove("hidden");
  };
}

</script>

</body>
</html>
