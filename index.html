<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIP Quote Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body {
  min-height: 100%;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,0.14), transparent 28%),
    linear-gradient(180deg, #0f172a 0%, #020617 100%);
  background-attachment: fixed;
  color: #e5e7eb;
  font-family: Inter, sans-serif;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
}

.input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color:white;
}

.input::placeholder {
  color: rgba(255,255,255,0.5);
}

.input:focus {
  border-color:#3b82f6;
  box-shadow:0 0 10px rgba(59,130,246,0.5);
  outline:none;
}

.tab-active {
  background: rgba(59,130,246,0.2);
  border:1px solid rgba(59,130,246,0.4);
}

.step { display:none; }
.step.active { display:block; }

.progress-bar {
  height:8px;
  background:#1e293b;
  border-radius:999px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:#3b82f6;
  width:20%;
  transition:0.3s;
}

/* INTRO */

#introScreen {
  transition: opacity 0.6s ease, visibility 0.6s;
}

.intro-logo {
  transform: scale(0.7);
  opacity: 0;
  animation: logoIn 2.9s ease forwards;
}

.intro-text {
  transform: translateY(20px);
  animation: textIn 1s ease forwards;
  animation-delay: 0.8s;
}

@keyframes logoIn {
  0% { opacity:0; transform:scale(0.7);}
  60% { opacity:1; transform:scale(2);}
  100% { transform:scale(1);}
}

@keyframes textIn {
  to { opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="p-6">

<!-- INTRO -->
<div id="introScreen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black">

<img 
src="https://raw.githubusercontent.com/N10ai/mip-tools/main/Untitled%20design%20-%201.png"
class="w-24 h-24 mb-6 intro-logo object-contain"
/>

<div class="text-lg tracking-wide text-white opacity-0 intro-text">
Smart Logistics. Faster Decisions.
</div>

</div>

<form id="quoteForm">

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">

<div class="flex items-center gap-3">
<img src="https://raw.githubusercontent.com/N10ai/mip-tools/main/Untitled%20design%20-%201.png"
class="h-14 object-contain drop-shadow-xl">

<div>
<div class="text-sm font-semibold">MIP Cargo Express</div>
<div class="text-xs text-gray-400">Instant Quote Portal</div>
</div>
</div>

<button type="button" id="aiFill"
class="px-5 py-2.5 rounded-lg text-sm font-semibold
bg-gradient-to-r from-blue-500 to-indigo-500
hover:from-blue-400 hover:to-indigo-400
text-white shadow-lg shadow-blue-500/30 transition">
⚡ Autofill with AI
</button>

</div>

<!-- HERO -->
<div class="mb-6">
<h2 class="text-2xl font-semibold mb-2">
Get your freight quote in seconds
</h2>
<p class="text-sm text-gray-400 max-w-xl">
Enter shipment details or use AI Autofill to instantly structure your quote.
No back-and-forth. No delays.
</p>
</div>

<!-- TABS -->
<div class="flex gap-3 mb-4 flex-wrap">
<button type="button" class="tab tab-active px-4 py-2 rounded-full" data-step="0">Contact</button>
<button type="button" class="tab px-4 py-2 rounded-full" data-step="1">Shipment</button>
<button type="button" class="tab px-4 py-2 rounded-full" data-step="2">Cargo</button>
<button type="button" class="tab px-4 py-2 rounded-full" data-step="3">Pickup</button>
<button type="button" class="tab px-4 py-2 rounded-full" data-step="4">Review</button>
</div>

<div class="progress-bar mb-6">
<div id="progress" class="progress-fill"></div>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

<!-- LEFT -->
<div class="lg:col-span-2 glass p-6 rounded-2xl">

<!-- STEP 0: CONTACT -->
<div class="step active">
  <div class="grid grid-cols-1 gap-4">
    <input
      name="referenceNumber"
      class="input p-3 rounded-lg"
      placeholder="Reference Number (optional)"
    >

    <input
      name="email"
      type="email"
      required
      class="input p-3 rounded-lg"
      placeholder="Email Address"
    >
  </div>

  <button type="button" class="next mt-6 bg-blue-600 px-4 py-2 rounded">
    Continue
  </button>
</div>

<!-- STEP 1: SHIPMENT -->
<div class="step">

<!-- MODE -->
<select id="mode" name="mode" class="input p-3 rounded-lg w-full mb-4">
  <option value="">Transport Mode</option>
  <option value="air">✈ Air</option>
  <option value="ocean">🚢 Ocean</option>
  <option value="ground">🚚 Ground</option>
</select>

<!-- AIR / OCEAN ROUTE -->
<div id="airOceanFields">

  <div class="grid grid-cols-1 gap-4">

    <input
      id="originSearch"
      name="originSearch"
      class="input p-3 rounded-lg"
      placeholder="Origin Airport / Port / City"
    >

    <input
      id="destinationSearch"
      name="destinationSearch"
      class="input p-3 rounded-lg"
      placeholder="Destination Airport / Port / City"
    >

  </div>

  <!-- hidden structured fields for later autocomplete/JSON hookup -->
  <input type="hidden" id="originCode" name="originCode">
  <input type="hidden" id="originName" name="originName">
  <input type="hidden" id="originCountry" name="originCountry">

  <input type="hidden" id="destinationCode" name="destinationCode">
  <input type="hidden" id="destinationName" name="destinationName">
  <input type="hidden" id="destinationCountry" name="destinationCountry">

</div>

<!-- GROUND ROUTE -->
<div id="groundFields" class="hidden">

  <div class="grid grid-cols-2 gap-4">

    <input name="originCity" class="input p-3 rounded-lg" placeholder="Origin City">
    <input name="destinationCity" class="input p-3 rounded-lg" placeholder="Destination City">

    <input name="originState" class="input p-3 rounded-lg" placeholder="Origin State">
    <input name="destinationState" class="input p-3 rounded-lg" placeholder="Destination State">

    <input name="originCountryGround" class="input p-3 rounded-lg" placeholder="Origin Country">
    <input name="destinationCountryGround" class="input p-3 rounded-lg" placeholder="Destination Country">

  </div>

</div>

<!-- SERVICE -->
<div id="serviceWrap" class="mt-5 hidden">

  <select id="serviceType" name="serviceType" class="input p-3 rounded-lg w-full">
    <option value="">Service Type</option>
  </select>

</div>

<!-- CONTAINER (ONLY FCL) -->
<div id="containerWrap" class="mt-4 hidden">

  <select name="containerSize" class="input p-3 rounded-lg w-full">
    <option value="">Container Size</option>
    <option>20GP</option>
    <option>40GP</option>
    <option>40HQ</option>
    <option>45HQ</option>
  </select>

</div>

<!-- BONDED / FTZ -->
<div class="mt-5 flex gap-4 text-sm">
  <label><input type="checkbox" id="isBonded"> Bonded</label>
  <label><input type="checkbox" id="isFTZ"> FTZ</label>
</div>

<div class="flex justify-between mt-6">
  <button type="button" class="prev bg-white/10 px-4 py-2 rounded">Back</button>
  <button type="button" class="next bg-blue-600 px-4 py-2 rounded">Next</button>
</div>

</div>

<!-- STEP 2 -->
<div class="step">

<div id="cargoItems"></div>

<button type="button" id="addCargo" class="mt-4 bg-blue-600 px-4 py-2 rounded">
+ Add Cargo
</button>

<div id="totals" class="mt-4 text-sm"></div>

<div class="flex justify-between mt-6">
<button type="button" class="prev bg-white/10 px-4 py-2 rounded">Back</button>
<button type="button" class="next bg-blue-600 px-4 py-2 rounded">Next</button>
</div>

</div>

<!-- STEP 3 -->
<div class="step">

<label><input type="checkbox" id="includeInland"> Include Inland</label>

<div id="inlandFields" class="hidden mt-4">
<input id="pickupCompany" class="input p-3 rounded mb-2" placeholder="Pickup Company">
<input id="deliveryCompany" class="input p-3 rounded" placeholder="Delivery Company">
</div>

<div class="flex justify-between mt-6">
<button type="button" class="prev bg-white/10 px-4 py-2 rounded">Back</button>
<button type="button" class="next bg-blue-600 px-4 py-2 rounded">Next</button>
</div>

</div>

<!-- STEP 4 -->
<div class="step">

<div id="review"></div>

<button type="submit" class="mt-6 w-full bg-blue-600 py-3 rounded">
Submit Quote
</button>

</div>

</div>

<!-- RIGHT -->
<div class="glass p-6 rounded-2xl">
<h2 class="mb-4">Live Summary</h2>
<div id="summary" class="text-sm space-y-2"></div>
</div>

</div>
</form>

<script>

<!-- ONLY SCRIPT PART CHANGED — EVERYTHING ELSE PRESERVED -->


// STEP SYSTEM
let step = 0;
const steps = document.querySelectorAll(".step");

function showStep(i){
  if (i < 0 || i > steps.length - 1) return;

  step = i;

  steps.forEach((s,idx)=>s.classList.toggle("active", idx===i));

  document.querySelectorAll(".tab").forEach((t,idx)=>{
    t.classList.toggle("tab-active", idx===i);
  });

  document.getElementById("progress").style.width = ((i+1)/5*100)+"%";
}

document.querySelectorAll(".next").forEach(btn=>{
  btn.onclick = ()=>showStep(step+1);
});

document.querySelectorAll(".prev").forEach(btn=>{
  btn.onclick = ()=>showStep(step-1);
});

document.querySelectorAll(".tab").forEach(tab=>{
  tab.onclick = ()=>showStep(Number(tab.dataset.step));
});

// CARGO
document.getElementById("addCargo").onclick = ()=>{
  const div = document.createElement("div");
  div.className="mb-4";

  div.innerHTML=`
  <input class="input p-2 mb-1 qty rounded" placeholder="Qty">
  <input class="input p-2 mb-1 weight rounded" placeholder="Weight">
  <input class="input p-2 mb-1 length rounded" placeholder="Length">
  <input class="input p-2 mb-1 width rounded" placeholder="Width">
  <input class="input p-2 mb-1 height rounded" placeholder="Height">
  `;

  document.getElementById("cargoItems").appendChild(div);
};

// SUMMARY
const form=document.getElementById("quoteForm");

form.addEventListener("input",()=>{
  const data=new FormData(form);

  const mode = data.get("mode") || "-";
  const origin = mode === "ground"
    ? (data.get("originCity") || "-")
    : (data.get("originSearch") || "-");

  const destination = mode === "ground"
    ? (data.get("destinationCity") || "-")
    : (data.get("destinationSearch") || "-");

  const reference = data.get("referenceNumber") || "-";
  const email = data.get("email") || "-";

  document.getElementById("summary").innerHTML=`
  <p>Reference: ${reference}</p>
  <p>Email: ${email}</p>
  <p>Origin: ${origin}</p>
  <p>Destination: ${destination}</p>
  <p>Mode: ${mode}</p>
  `;
});

// AI
document.getElementById("aiFill").onclick=()=>{
  const mode = document.getElementById("mode").value;

  if (mode === "ground") {
    document.querySelector('[name="originCity"]').value="Miami";
    document.querySelector('[name="destinationCity"]').value="Orlando";
  } else {
    document.querySelector('[name="originSearch"]').value="MIA - Miami, United States";
    document.querySelector('[name="destinationSearch"]').value="UIO - Quito, Ecuador";
  }

  form.dispatchEvent(new Event("input"));
};

// INLAND
document.getElementById("includeInland").onchange=e=>{
  document.getElementById("inlandFields").classList.toggle("hidden", !e.target.checked);
};

// SUBMIT
form.onsubmit=(e)=>{
  e.preventDefault();
  alert("Ready to connect webhook");
};

// INTRO
window.onload=()=>{
  setTimeout(()=>{
    const intro=document.getElementById("introScreen");
    intro.style.opacity="0";
    setTimeout(()=>intro.style.display="none",600);
  },2200);
};

// SERVICE
const modeEl = document.getElementById("mode");
const serviceEl = document.getElementById("serviceType");

const serviceWrap = document.getElementById("serviceWrap");
const containerWrap = document.getElementById("containerWrap");

const airOceanFields = document.getElementById("airOceanFields");
const groundFields = document.getElementById("groundFields");

function updateShipmentUI() {

  const mode = modeEl.value;

  serviceWrap.classList.add("hidden");
  containerWrap.classList.add("hidden");
  serviceEl.innerHTML = '<option value="">Service Type</option>';

  if (mode === "ground") {
    airOceanFields.classList.add("hidden");
    groundFields.classList.remove("hidden");
  } else {
    airOceanFields.classList.remove("hidden");
    groundFields.classList.add("hidden");
  }

  if (mode === "ocean") {
    serviceWrap.classList.remove("hidden");
    serviceEl.innerHTML += `
      <option value="lcl">LCL</option>
      <option value="fcl">FCL</option>
    `;
  }

  if (mode === "ground") {
    serviceWrap.classList.remove("hidden");
    serviceEl.innerHTML += `
      <option value="ltl">LTL</option>
      <option value="ftl">FTL</option>
    `;
  }

  form.dispatchEvent(new Event("input"));
}

serviceEl.addEventListener("change", () => {
  containerWrap.classList.toggle("hidden", serviceEl.value !== "fcl");
});

modeEl.addEventListener("change", updateShipmentUI);
updateShipmentUI();


//////////////////////////////////////////////////
// ✅ FIXED AUTOCOMPLETE SYSTEM
//////////////////////////////////////////////////

let locations = [];

fetch("https://n10ai.github.io/mip-tools/logistics-locations.json")
  .then(res => res.json())
  .then(data => {
    locations = data;
    console.log("✅ Locations loaded:", locations.length);

    // attach ONLY AFTER data loads
    attachAutocomplete("originSearch", "origin");
    attachAutocomplete("destinationSearch", "destination");
  })
  .catch(err => console.error("❌ JSON load error:", err));

function filterLocations(query, mode) {

  query = query.toLowerCase();

  let results = locations.filter(loc =>
    loc.code?.toLowerCase().includes(query) ||
    loc.name?.toLowerCase().includes(query) ||
    loc.city?.toLowerCase().includes(query) ||
    loc.country?.toLowerCase().includes(query)
  );

  // prioritize instead of blocking
  if (mode === "air") {
    results = results.sort((a, b) => (b.type === "airport") - (a.type === "airport"));
  }

  if (mode === "ocean") {
    results = results.sort((a, b) => (b.type === "seaport") - (a.type === "seaport"));
  }

  return results.slice(0, 6);
}

function attachAutocomplete(inputId, type) {

  const input = document.getElementById(inputId);

  const dropdown = document.createElement("div");
  dropdown.className = "absolute z-50 bg-black border border-white/10 rounded-lg mt-1 w-full text-sm hidden";

  input.parentElement.style.position = "relative";
  input.parentElement.appendChild(dropdown);

  input.addEventListener("input", () => {

    const query = input.value.trim();
    const mode = document.getElementById("mode").value;

    if (query.length < 2) {
      dropdown.classList.add("hidden");
      return;
    }

    const results = filterLocations(query, mode);

    dropdown.innerHTML = "";

    results.forEach(loc => {

      const option = document.createElement("div");
      option.className = "p-2 cursor-pointer hover:bg-white/10";

      option.innerHTML = `<b>${loc.code}</b> — ${loc.city}, ${loc.country}`;

      option.onclick = () => {

        input.value = `${loc.code} - ${loc.city}, ${loc.country}`;

        if (type === "origin") {
          document.getElementById("originCode").value = loc.code;
          document.getElementById("originName").value = loc.name;
          document.getElementById("originCountry").value = loc.country;
        }

        if (type === "destination") {
          document.getElementById("destinationCode").value = loc.code;
          document.getElementById("destinationName").value = loc.name;
          document.getElementById("destinationCountry").value = loc.country;
        }

        dropdown.classList.add("hidden");
      };

      dropdown.appendChild(option);
    });

    dropdown.classList.toggle("hidden", results.length === 0);
  });

  document.addEventListener("click", (e) => {
    if (!input.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.classList.add("hidden");
    }
  });
}






</script>

</body>
</html>
